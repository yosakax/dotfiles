# unbind *all* keybindings
unbind-key -a




## prefixキーの変更
# prefixキーをC-aに変更する
set -g prefix C-a

# デフォルトのprefixキーC-bを解除する
unbind C-b


## ペインのキーバインド
# prefix+\でペインを垂直分割する
bind | split-window -h

# prefix+-でペインを水平分割する
bind S split-window -v

# ペインの移動
# bind -n M-h select-pane -L
# bind -n M-j select-pane -D
# bind -n M-k select-pane -U
# bind -n M-l select-pane -R

# ペインを最大匁E
# bind -n C-z resize-pane -Z
# ペインをリサイズする

bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5


## ウィンドウのキーバインチE
# ウィンドウを切り替える
bind -n S-left previous-window
bind -n S-right next-window


## ステータスラインの見た目の変更 (おしゃれ寄り、プラグイン無し)

# 256色モードを有効にする
set-option -g default-terminal "screen-256color"
set -g terminal-overrides ',xterm-256color:Tc'
set-option -g focus-events on
set-option -sg escape-time 10

# ステータスの更新間隔と表示ON
set -g status on
set -g status-interval 5

# ベースの色 (256色コード)
set -g @status_bg "colour234"
set -g @status_fg "colour250"
set -g @status_accent "colour148"
set -g @status_muted "colour240"

# ステータス全体のスタイル
set -g status-style "fg=#{@status_fg},bg=#{@status_bg}"

# 左: セッション名（シンプルで読みやすい表示）
set -g status-left-length 40
set -g status-left "#[fg=#{@status_bg},bg=#{@status_accent},bold]  #S  #[fg=#{@status_accent},bg=#{@status_bg}] | #[default]"

# window 表示設定
set -g status-justify centre
setw -g window-status-format "#[fg=#{@status_muted},bg=#{@status_bg}] #I:#W "
setw -g window-status-current-format "#[fg=#{@status_bg},bg=#{@status_accent},bold] #I:#W #[default]"

# 右: ユーザー@ホスト・カレントディレクトリ・gitブランチ(存在する場合)・日時
# git 情報はリポジトリでない場合は空になるようにしてあります（重い場合は削除可）
set -g status-right-length 200
set -g status-right "#[fg=#{@status_muted},bg=#{@status_bg}] #(whoami)@#h | #[fg=#{@status_fg},bg=#{@status_bg}]#{pane_current_path} | #[fg=#{@status_muted},bg=#{@status_bg}]#(git -C #{pane_current_path} rev-parse --abbrev-ref HEAD 2>/dev/null || echo -) | #[fg=#{@status_fg},bg=#{@status_bg},bold] %Y-%m-%d %H:%M "

# pane の枠線とアクティブペインの色
set -g pane-border-style "fg=#{@status_muted}"
set -g pane-active-border-style "fg=#{@status_accent}"

# 表示時間（メッセージ）を短めに
set -g display-time 1500

# windowのインデックスを1から始める（既存設定を保持）
set -g base-index 1

# マウス操作を有効にする（既に有効なら冗長ではない）
set-option -g mouse on

# prefix+r で設定をリロード（メッセージ文言を控えめに）
bind r source-file ~/.tmux.conf \; display "tmux: reloaded"

# all the regular tmux keys

bind-key C-z suspend-client
bind-key ! break-pane
bind-key A command-prompt -I "#S" "rename-session '%%'"
bind-key "'" command-prompt -p index "select-window -t ':%%'"
bind-key ( switch-client -p
bind-key ) switch-client -n
bind-key , command-prompt -I "#W" "rename-window '%%'"
bind-key - delete-buffer
bind-key . command-prompt "move-window -t '%%'"
bind-key 1 select-window -t :1
bind-key 2 select-window -t :2
bind-key 3 select-window -t :3
bind-key 4 select-window -t :4
bind-key 5 select-window -t :5
bind-key 6 select-window -t :6
bind-key 7 select-window -t :7
bind-key 8 select-window -t :8
bind-key 9 select-window -t :9
bind-key 0 select-window -t :10
bind-key : command-prompt
bind-key [ copy-mode
bind-key ] paste-buffer
bind-key c new-window
bind-key d detach-client
bind-key f command-prompt "find-window '%%'"
bind-key i display-message
bind-key n next-window
bind-key p previous-window
bind-key q display-panes
bind-key t clock-mode
bind-key x confirm-before -p "kill-pane #P? (y/n)" kill-pane
# bind-key { swap-pane -U
# bind-key } swap-pane -D
bind-key -r k select-pane -U
bind-key -r j select-pane -D
bind-key -r h select-pane -L
bind-key -r l select-pane -R
